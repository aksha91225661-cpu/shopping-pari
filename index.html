<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Pari - Infinite Price Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=400;700&family=Poppins:wght=300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #050210;
            --card-bg: rgba(18, 9, 36, 0.75);
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --text-main: #ffffff;
            --text-dim: #a4a2c1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: var(--bg-color); color: var(--text-main); overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #160933 0%, var(--bg-color) 90%);
            min-height: 100vh;
        }

        /* 1. Free Local Registration Layer */
        #reg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 1, 10, 0.98); backdrop-filter: blur(15px); z-index: 20000;
            display: flex; justify-content: center; align-items: center;
        }
        .reg-card {
            background: var(--card-bg); border: 2px solid var(--neon-blue);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.3); padding: 40px 30px; border-radius: 24px;
            text-align: center; max-width: 400px; width: 90%;
        }
        .reg-card h2 { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); margin-bottom: 10px; font-size: 24px; }
        .reg-card input {
            width: 100%; padding: 14px 20px; background: rgba(0,0,0,0.6);
            border: 1px solid var(--neon-pink); border-radius: 30px; color: white;
            font-size: 16px; margin-bottom: 20px; outline: none; text-align: center;
        }
        .reg-card button {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink)); color: white;
            border: none; padding: 12px 35px; border-radius: 30px; font-weight: 600; cursor: pointer; box-shadow: 0 0 15px var(--neon-pink);
        }

        /* Floating Pari Zone */
        .pari-container { text-align: center; margin: 15px 0; position: relative; }
        .pari-avatar { font-size: 45px; display: inline-block; animation: floatPari 3s ease-in-out infinite; filter: drop-shadow(0 0 10px var(--neon-pink)); }
        @keyframes floatPari {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(5deg); }
        }
        .pari-bubble {
            background: rgba(255, 0, 127, 0.15); border: 1px solid var(--neon-pink);
            padding: 8px 16px; border-radius: 15px; display: inline-block; margin-top: 5px;
            font-size: 13px; color: #fff; max-width: 80%; box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100;
            background: rgba(6, 2, 18, 0.85); backdrop-filter: blur(8px);
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: bold;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .user-badge {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 14px; border-radius: 25px; display: flex; align-items: center; gap: 8px; font-size: 12px;
        }
        .savings-counter { color: var(--neon-green); font-weight: bold; }

        .search-container { max-width: 750px; margin: 20px auto; padding: 0 15px; }
        .search-box-wrapper {
            display: flex; align-items: center; background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; padding: 4px 12px;
        }
        .search-box-wrapper input { flex: 1; background: transparent; border: none; padding: 10px; color: white; font-size: 15px; outline: none; }
        .scanner-btn { background: transparent; border: none; color: var(--neon-blue); font-size: 20px; padding: 6px 10px; cursor: pointer; }

        .categories-section { max-width: 1150px; margin: 0 auto 20px auto; padding: 0 15px; }
        .categories-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .category-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; padding: 12px 4px; text-align: center; cursor: pointer; transition: 0.2s; }
        .category-card:hover { border-color: var(--neon-blue); }
        .category-card p { font-size: 11px; margin-top: 5px; }
        .category-card i { font-size: 18px; color: var(--neon-blue); }

        .matrix-container { max-width: 1150px; margin: 0 auto 80px auto; padding: 0 15px; }
        .matrix-row { background: rgba(10, 4, 22, 0.4); border-radius: 18px; padding: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.03); }
        .row-header { font-size: 13px; color: #fff; margin-bottom: 12px; font-weight: 600; }
        
        .matrix-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .store-card {
            background: #110b24; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px;
            padding: 10px 6px; position: relative; display: flex; flex-direction: column; justify-content: space-between;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        
        /* 3. Smart Light Glowing Effect on Cheapest Product */
        .store-card.glow-winner {
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
            animation: pulseGlow 1.5s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }
            100% { box-shadow: 0 0 22px rgba(57, 255, 20, 0.6); }
        }

        .store-img { width: 100%; height: 100px; object-fit: contain; border-radius: 8px; background: #1b1530; margin-bottom: 6px; }
        .store-name { font-size: 11px; color: var(--text-dim); font-weight: bold; text-transform: uppercase; }
        .store-price { font-size: 15px; font-weight: bold; color: #fff; margin: 2px 0; }
        
        .product-meta { font-size: 9px; color: var(--text-dim); display: flex; flex-direction: column; gap: 1px; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 4px; }
        .meta-rating { color: #ffb800; font-weight: bold; }
        .meta-delivery { color: var(--neon-blue); }
        .not-available { color: var(--neon-pink); font-size: 9px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="reg-overlay" style="display: none;">
        <div class="reg-card">
            <h2>SHOPPING PARI</h2>
            <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 20px;">Apna Naam Register Karein ✨</p>
            <input type="text" id="user-name-input" placeholder="Yahan apna naam likhein...">
            <button onclick="saveUserLocal()">Airtel Matrix Start</button>
        </div>
    </div>

    <header>
        <div class="logo-text">SHOPPING PARI</div>
        <div class="user-badge">
            <span id="display-profile-name">User</span>
            <div class="savings-counter">Saved: ₹<span id="saved-amt">540</span></div>
        </div>
    </header>

    <div class="pari-container">
        <div class="pari-avatar" id="pari-img">🧚‍♀️✨</div><br>
        <div class="pari-bubble" id="pari-speech">Hello! Main aapki shopping pari hoon.</div>
    </div>

    <div class="search-container">
        <div class="search-box-wrapper">
            <input type="text" id="main-search" placeholder="Kuch bhi search karein (e.g. Bottle, Shoes)..." onkeypress="handleSearch(event)">
            <button class="scanner-btn" onclick="openGalleryScanner()"><i class="fa-solid fa-camera"></i></button>
            <input type="file" id="image-upload-handler" style="display: none;" accept="image/*" onchange="processImageScraper(event)">
        </div>
    </div>

    <div class="categories-section">
        <div class="categories-grid">
            <div class="category-card" onclick="triggerLiveScrape('Watches')"><i class="fa-solid fa-stopwatch"></i><p>Watches</p></div>
            <div class="category-card" onclick="triggerLiveScrape('Shoes')"><i class="fa-solid fa-shoe-prints"></i><p>Shoes</p></div>
            <div class="category-card" onclick="triggerLiveScrape('Shirts')"><i class="fa-solid fa-shirt"></i><p>Shirts</p></div>
            <div class="category-card" onclick="triggerLiveScrape('Phones')"><i class="fa-solid fa-mobile-screen"></i><p>Phones</p></div>
        </div>
    </div>

    <div class="matrix-container" id="matrix-wrapper"></div>

    <script>
        const BACKEND_API_URL = "https://shopping-pari-backend.onrender.com/api/scrape";
        
        // 💰 REVENUE GENERATION SYSTEM - Apni Affiliate ID yahan lagayein
        const AMAZON_AFFILIATE_TAG = "yourtag-21"; 
        const FLIPKART_AFFILIATE_ID = "yourflipid";
        const MEESHO_AFFILIATE_LINK = "https://earnkaro.com"; 

        function speakText(text) {
            document.getElementById("pari-speech").innerText = text;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'hi-IN'; // Speak in Hindi/Hinglish
                window.speechSynthesis.speak(utterance);
            }
        }

        window.onload = function() {
            let savedName = localStorage.getItem("shopping_pari_user");
            if (!savedName) {
                document.getElementById("reg-overlay").style.display = "flex";
            } else {
                document.getElementById("display-profile-name").innerText = savedName;
                speakText(`Welcome back ${savedName} sir! Magic wand ready hai.`);
                triggerLiveScrape('Watches');
            }
        };

        function saveUserLocal() {
            let name = document.getElementById("user-name-input").value.strip();
            if(name) {
                localStorage.setItem("shopping_pari_user", name);
                document.getElementById("display-profile-name").innerText = name;
                document.getElementById("reg-overlay").style.display = "none";
                speakText(`Welcome ${name} sir! Main aapki Shopping Pari hoon.`);
                triggerLiveScrape('Watches');
            }
        }

        function handleSearch(e) {
            if (e.key === "Enter") {
                triggerLiveScrape(document.getElementById("main-search").value);
            }
        }

        function openGalleryScanner() { document.getElementById("image-upload-handler").click(); }
        
        function processImageScraper(e) {
            speakText("Sir, photo analyze ho rahi hai. Pari magic kar rahi hai!");
            setTimeout(() => { triggerLiveScrape("Shoes"); }, 1500);
        }

        async function triggerLiveScrape(query) {
            if(!query) return;
            speakText(`Sir magic ho raha hai, ${query} scan ho raha hai...`);
            
            try {
                const res = await fetch(`${BACKEND_API_URL}?q=${encodeURIComponent(query)}`);
                const productsArray = await res.json();
                
                document.getElementById("matrix-wrapper").innerHTML = "";

                if(productsArray.length === 0) {
                    document.getElementById("matrix-wrapper").innerHTML = "<p style='text-align:center; color:var(--neon-pink);'>No matching products found anywhere.</p>";
                    return;
                }

                // Append multi rows (Line 1, Line 2, Line 3...)
                productsArray.forEach((product, idx) => {
                    generateRowMarkup(product, idx);
                });

            } catch (e) {
                console.log(e);
            }
        }

        function generateRowMarkup(product, index) {
            const wrapper = document.getElementById("matrix-wrapper");
            
            // Find lowest platform to trigger glowing laser light
            let prices = [];
            if(product.amz_p > 0) prices.push({name: 'amazon', val: product.amz_p});
            if(product.flp_p > 0) prices.push({name: 'flipkart', val: product.flp_p});
            if(product.msh_p > 0) prices.push({name: 'meesho', val: product.msh_p});

            let cheapestStore = "";
            if(prices.length > 0) {
                prices.sort((a,b) => a.val - b.val);
                cheapestStore = prices[0].name;
            }

            // Inform user via voice about the cheapest choice on line 1
            if(index === 0 && cheapestStore !== "") {
                setTimeout(() => {
                    speakText(`Sir, is line me ${cheapestStore} par saaman sabse sasta hai!`);
                }, 2000);
            }

            // Affiliate Link Generators
            let amzLink = `https://www.amazon.in/dp/example?tag=${AMAZON_AFFILIATE_TAG}`;
            let flpLink = `https://flipkart.com/search?q=${encodeURIComponent(product.name)}&affid=${FLIPKART_AFFILIATE_ID}`;
            let mshLink = MEESHO_AFFILIATE_LINK;

            const row = document.createElement("div");
            row.className = "matrix-row";
            row.innerHTML = `
                <div class="row-header">Line ${index+1}: ${product.name}</div>
                <div class="matrix-grid">
                    
                    <div class="store-card ${cheapestStore === 'amazon' ? 'glow-winner' : ''}" onclick="window.open('${amzLink}', '_blank')">
                        ${cheapestStore === 'amazon' ? '<div class="best-badge">BEST</div>' : ''}
                        <img class="store-img" src="${product.img}">
                        <div class="store-name">Amazon</div>
                        ${product.amz_p > 0 ? `<div class="store-price">₹${product.amz_p}</div>
                        <div class="product-meta">
                            <span class="meta-rating">${product.amz_r}</span>
                            <span class="meta-delivery">${product.amz_d}</span>
                        </div>` : '<div class="not-available">Not Available</div>'}
                    </div>

                    <div class="store-card ${cheapestStore === 'flipkart' ? 'glow-winner' : ''}" onclick="window.open('${flpLink}', '_blank')">
                        ${cheapestStore === 'flipkart' ? '<div class="best-badge">BEST</div>' : ''}
                        <img class="store-img" src="${product.img}">
                        <div class="store-name">Flipkart</div>
                        ${product.flp_p > 0 ? `<div class="store-price">₹${product.flp_p}</div>
                        <div class="product-meta">
                            <span class="meta-rating">${product.flp_r}</span>
                            <span class="meta-delivery">${product.flp_d}</span>
                        </div>` : '<div class="not-available">Not Available</div>'}
                    </div>

                    <div class="store-card ${cheapestStore === 'meesho' ? 'glow-winner' : ''}" onclick="window.open('${mshLink}', '_blank')">
                        ${cheapestStore === 'meesho' ? '<div class="best-badge">BEST</div>' : ''}
                        <img class="store-img" src="${product.img}">
                        <div class="store-name">Meesho</div>
                        ${product.msh_p > 0 ? `<div class="store-price">₹${product.msh_p}</div>
                        <div class="product-meta">
                            <span class="meta-rating">${product.msh_r}</span>
                            <span class="meta-delivery">${product.msh_d}</span>
                        </div>` : '<div class="not-available">Not Available</div>'}
                    </div>

                </div>
            `;
            wrapper.appendChild(row);
        }
    </script>
</body>
</html>
